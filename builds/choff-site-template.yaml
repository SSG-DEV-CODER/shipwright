# Shipwright Build Configuration
# Target: choff-site-template (Phase 1 of platform restructure)
#
# Usage:
#   cd /path/to/target/workspace
#   bun /path/to/shipwright/src/index.ts build \
#     /Users/maffy/Developer/choff-platform/docs/plans/PRD-platform-restructure-phase-1.md \
#     --config /Users/maffy/Developer/shipwright/builds/choff-site-template.yaml

target:
  dir: "."
  language: "typescript"
  runtime: "bun"
  typecheck_cmd: "bunx tsc --noEmit"
  test_cmd: "bun test"
  lint_cmd: "bunx tsc --noEmit"

models:
  scout: "claude-sonnet-4-20250514"
  planner: "claude-opus-4-20250514"
  generator: "claude-opus-4-20250514"
  evaluator: "codex"
  negotiator: "claude-opus-4-20250514"
  improver: "claude-sonnet-4-20250514"

pipeline:
  max_retries: 7
  max_scouts: 3
  contract_rounds: 2
  eval_pass_threshold: 7.0

expertise:
  dir: "/Users/maffy/Developer/shipwright/expertise"
  auto_improve: true
  max_lines: 1000

# Reference codebases — scouts explore these for patterns (read-only)
# NOTE: Hub (798 files) removed — too large, causes SDK to hang.
# Hub patterns are captured in the nextjs-payload expertise file instead.
references:
  - path: "/Users/maffy/Developer/choff-platform/packages/publish"
    label: "CHOFF Publish (content pipeline + social connectors)"
  - path: "/Users/maffy/Developer/choff-platform/packages/watchtower"
    label: "CHOFF Watchtower (analytics + defense)"

tracking:
  progress_file: "PROGRESS.md"
  log_file: "LOG.md"
  git_commits: true
  commit_prefix: "shipwright:"

limits:
  max_tokens_per_agent_call: 200000
  enforce: false  # Subscription pricing — track but don't gate

# MCP servers — available to Claude agents for documentation and browser access
mcp_servers:
  context7:
    command: "npx"
    args: ["-y", "@upstash/context7-mcp"]
  agent-browser:
    command: "npx"
    args: ["-y", "@anthropic-ai/agent-browser"]
